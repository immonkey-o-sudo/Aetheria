name: Send Push Info to Discord

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_PUSH }}
          EVENT: ${{ toJson(github.event) }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
        run: |
          COMMITS=$(jq -r '.commits[] | "• `\(.message)` — \(.author.name)"' <<< "$EVENT" | paste -sd '\n' -)
          SHORT_SHA="${SHA:0:7}"
          BUILD_URL="https://github.com/$REPO/actions/workflows/build.yml?query=branch%3A$REF+event%3Apush"
          COMMIT_URL="https://github.com/$REPO/commit/$SHA"
          PAYLOAD=$(jq -n \
            --arg commits "$COMMITS" \
            --arg actor "$ACTOR" \
            --arg ref "$REF" \
            --arg repo "$REPO" \
            --arg short_sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg build_url "$BUILD_URL" \
            --arg timestamp "$TIMESTAMP" \
            '{embeds: [{
              author: {
                name: ($actor + " pushed to " + $ref),
                icon_url: ("https://github.com/" + $actor + ".png?size=32")
              },
              description: $commits,
              color: 3447003,
              fields: [
                {name: "Commit", value: ("[`" + $short_sha + "`](" + $commit_url + ")"), inline: true},
                {name: "Build", value: ("[View Build](" + $build_url + ")"), inline: true}
              ],
              footer: {text: "Aetheria Push Event"},
              timestamp: $timestamp
            }]}')
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$WEBHOOK"